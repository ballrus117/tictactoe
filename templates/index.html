<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multiplayer Tic-Tac-Toe</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            text-align: center; 
            margin: 0;
            padding: 20px 10px;
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            color: white; 
            text-shadow: 2px 2px 8px #000000;
            transition: background-image 0.5s ease-in-out;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 { font-size: 2.5rem; margin-bottom: 10px; }
        h2 { font-size: 1.5rem; min-height: 1.8rem; }
        h3 { font-size: 1.1rem; margin-top: 5px; }

        #board { 
            display: grid; 
            grid-template-columns: repeat(3, 110px); 
            grid-template-rows: repeat(3, 110px);
            gap: 10px; 
            justify-content: center; 
            margin: 25px auto;
        }

        .square {
            width: 100%; 
            height: 100%; 
            font-size: 48px; 
            cursor: pointer;
            background-color: rgba(255, 255, 255, 0.85);
            border: 4px solid #222;
            border-radius: 12px;
            font-weight: bold;
            color: #222;
            text-shadow: none;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background-color 0.2s;
        }

        .square:hover { background-color: rgba(255, 255, 255, 0.95); }

        @media (max-width: 400px) {
            #board {
                grid-template-columns: repeat(3, 85px);
                grid-template-rows: repeat(3, 85px);
                gap: 8px;
            }
            .square { font-size: 36px; }
            h1 { font-size: 2rem; }
        }

        button.reset-btn { 
            padding: 12px 30px; 
            font-size: 18px; 
            cursor: pointer; 
            background: #222; 
            color: white; 
            border: 2px solid white; 
            border-radius: 8px;
            transition: 0.3s;
        }
        
        button.reset-btn:hover { background: #444; }

        #mute-btn {
            position: fixed; 
            bottom: 20px;
            right: 20px;
            background-color: rgba(0, 0, 0, 0.7);
            color: white;
            border: 2px solid white;
            border-radius: 50%; 
            width: 50px;
            height: 50px;
            font-size: 22px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        #role-display { color: #ffeb3b; }
    </style>
</head>
<body>

    <button id="mute-btn" onclick="toggleMute()">🔊</button>

    <h1>Tic-Tac-Toe</h1>
    <h2 id="turn-display">Waiting for players...</h2>
    <h3 id="role-display">Connecting to server...</h3>

    <audio id="bg-music" loop>
        <source id="music-source" src="/static/music.mp3" type="audio/mpeg">
    </audio>

    <div id="board">
        <button class="square" onclick="makeMove(0)"></button>
        <button class="square" onclick="makeMove(1)"></button>
        <button class="square" onclick="makeMove(2)"></button>
        <button class="square" onclick="makeMove(3)"></button>
        <button class="square" onclick="makeMove(4)"></button>
        <button class="square" onclick="makeMove(5)"></button>
        <button class="square" onclick="makeMove(6)"></button>
        <button class="square" onclick="makeMove(7)"></button>
        <button class="square" onclick="makeMove(8)"></button>
    </div>

    <button class="reset-btn" onclick="resetGame()">Reset Game</button>

    <script>
        function chooseWallpaper() {
            const wallpapers = ['bg1.jpg', 'bg2.jpg', 'bg3.jpg', 'bg4.jpg', 'bg5.jpg', 'bg6.jpg'];
            const qotsaWallpaper = 'qotsa.jpg';
            
            if (Math.random() < 0.1) {
                return qotsaWallpaper;
            } else {
                return wallpapers[Math.floor(Math.random() * wallpapers.length)];
            }
        }
        
        document.addEventListener('DOMContentLoaded', function() {
            const wallpaper = chooseWallpaper();
            document.body.style.backgroundImage = "url('/static/" + wallpaper + "')";
            
            let musicSource = document.getElementById('music-source');
            if (wallpaper === 'qotsa.jpg') {
                musicSource.src = "/static/secret_song.mp3";
            } else if (wallpaper === 'bg6.jpg') {
                musicSource.src = "/static/ff.mp3";
            } else {
                musicSource.src = "/static/music.mp3";
            }
        });

        const socket = io();
        let myRole = ''; 

        socket.on('assign_role', function(data) {
            myRole = data.role;
            if (myRole === 'Spectator') {
                document.getElementById('role-display').innerText = "Lobby is full. You are spectating.";
            } else {
                document.getElementById('role-display').innerText = "You are playing as: " + myRole;
            }
        });

        function toggleMute() {
            let audioPlayer = document.getElementById('bg-music');
            let muteBtn = document.getElementById('mute-btn');
            audioPlayer.muted = !audioPlayer.muted;
            muteBtn.innerText = audioPlayer.muted ? "🔇" : "🔊";
        }

        function makeMove(index) {
            socket.emit('player_clicked', {index: index});
            document.getElementById('bg-music').play().catch(e => console.log("Audio waiting..."));
        }

        function resetGame() {
            socket.emit('reset_game');
        }

        socket.on('update_board', function(data) {
            const squares = document.getElementsByClassName('square');
            for (let i = 0; i < 9; i++) {
                squares[i].innerText = data.board[i];
            }
            // MODIFIED: Use turn_msg for personalized turn notifications
            document.getElementById('turn-display').innerText = data.turn_msg;
            document.getElementById('turn-display').style.color = "white"; 
        });

        socket.on('new_round', function(data) {
            document.body.style.backgroundImage = "url('/static/" + data.wallpaper + "')";

            let audioPlayer = document.getElementById('bg-music');
            let musicSource = document.getElementById('music-source');
            
            if (data.wallpaper === 'qotsa.jpg') {
                musicSource.src = "/static/secret_song.mp3";
            } else if (data.wallpaper === 'bg6.jpg') {
                musicSource.src = "/static/ff.mp3";
            } else {
                musicSource.src = "/static/music.mp3";
            }
            
            audioPlayer.load();
            audioPlayer.play().catch(e => console.log("Audio waiting..."));
        });

        socket.on('announce_winner', function(data) {
            // Displays the specific message sent from the server
            document.getElementById('turn-display').innerText = data.msg;
            
            // Color coding based on your custom messages
            if (data.msg === "wow congratulations you won.") {
                document.getElementById('turn-display').style.color = "#4CAF50"; // Green
            } else if (data.msg === "wow you suck you lost.") {
                document.getElementById('turn-display').style.color = "#FF5252"; // Red
            } else if (data.msg === "wow both of you suck it is a tie.") {
                document.getElementById('turn-display').style.color = "#ffeb3b"; // Yellow
            }
        });
    </script>
</body>
</html>
