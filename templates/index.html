<!DOCTYPE html>
<html>
<head>
    <title>Multiplayer Tic-Tac-Toe</title>
    <!-- Import Socket.IO so the browser can talk to Python -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <style>
        body { 
            font-family: Arial; 
            text-align: center; 
            margin-top: 50px; 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: white; 
            text-shadow: 3px 3px 5px #000000;
            transition: background-image 0.5s ease-in-out;
        }
        #board { 
            display: grid; 
            grid-template-columns: repeat(3, 117px); 
            gap: 3px; 
            justify-content: center; 
            margin: 30px auto;
        }
        .square {
            width: 117px; 
            height: 117px; 
            font-size: 52px; 
            cursor: pointer;
            background-color: rgba(240, 240, 240, 0.8);
            border: 5px solid #333;
            font-weight: bold;
        }
        button { padding: 10px 20px; font-size: 19px; cursor: pointer; }

        /* Circular Mute Button */
        #mute-btn {
            position: fixed; 
            bottom: 20px;
            right: 20px;
            background-color: rgba(0, 0, 0, 0.6);
            color: white;
            border: 2px solid white;
            border-radius: 50%; 
            width: 55px;
            height: 55px;
            font-size: 26px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0; 
        }
        #mute-btn:hover {
            background-color: rgba(0, 0, 0, 0.9);
        }
        
        #role-display {
            color: #ffeb3b; 
            font-weight: normal;
        }
    </style>
</head>
<body>

    <button id="mute-btn" onclick="toggleMute()">🔊</button>

    <h1>Tic-Tac-Toe</h1>
    <h2 id="turn-display">Waiting for players...</h2>
    <h3 id="role-display">Connecting to server...</h3>

    <audio id="bg-music" loop>
        <source id="music-source" src="/static/music.mp3" type="audio/mpeg">
    </audio>

    <div id="board">
        <button class="square" onclick="makeMove(0)"></button>
        <button class="square" onclick="makeMove(1)"></button>
        <button class="square" onclick="makeMove(2)"></button>
        <button class="square" onclick="makeMove(3)"></button>
        <button class="square" onclick="makeMove(4)"></button>
        <button class="square" onclick="makeMove(5)"></button>
        <button class="square" onclick="makeMove(6)"></button>
        <button class="square" onclick="makeMove(7)"></button>
        <button class="square" onclick="makeMove(8)"></button>
    </div>

    <button onclick="resetGame()">Reset Game</button>

    <script>
        const socket = io();
        let myRole = ''; 

        // Listen for the server to tell us our role AND the current wallpaper
        socket.on('assign_role', function(data) {
            myRole = data.role;
            if (myRole === 'Spectator') {
                document.getElementById('role-display').innerText = "Lobby is full. You are spectating.";
            } else {
                document.getElementById('role-display').innerText = "You are playing as: " + myRole;
            }
            
            // Set the wallpaper sent by the server
            if (data.wallpaper) {
                document.body.style.backgroundImage = "url('/static/" + data.wallpaper + "')";
            }
        });

        function toggleMute() {
            let audioPlayer = document.getElementById('bg-music');
            let muteBtn = document.getElementById('mute-btn');
            audioPlayer.muted = !audioPlayer.muted;
            muteBtn.innerText = audioPlayer.muted ? "🔇" : "🔊";
        }

        function makeMove(index) {
            socket.emit('player_clicked', {index: index});
            document.getElementById('bg-music').play().catch(e => console.log("Audio waiting for interaction..."));
        }

        function resetGame() {
            socket.emit('reset_game');
        }

        socket.on('update_board', function(data) {
            const squares = document.getElementsByClassName('square');
            for (let i = 0; i < 9; i++) {
                squares[i].innerText = data.board[i];
            }
            document.getElementById('turn-display').innerText = "Your turn b0ss : " + data.turn;
            document.getElementById('turn-display').style.color = "white"; // Reset color
        });

        // Sync new wallpaper when game resets
        socket.on('new_round', function(data) {
            document.body.style.backgroundImage = "url('/static/" + data.wallpaper + "')";
            
            // Logic to swap music based on the server's choice
            let audioPlayer = document.getElementById('bg-music');
            let musicSource = document.getElementById('music-source');
            
            if (data.wallpaper === 'qotsa.jpg') {
                musicSource.src = "/static/secret_song.mp3";
            } else if (data.wallpaper === 'bg6.jpg') {
                musicSource.src = "/static/ff.mp3";
            } else {
                musicSource.src = "/static/music.mp3";
            }
            
            audioPlayer.load();
            audioPlayer.play().catch(e => console.log("Audio waiting..."));
        });

        socket.on('announce_winner', function(data) {
            // Uses the personalized message from Python ('You Won!', 'You Lost!', etc.)
            document.getElementById('turn-display').innerText = data.msg;
            
            // Optional: Color coding for the result
            if (data.msg === "wow congratulations you won.") {
                document.getElementById('turn-display').style.color = "#4CAF50"; // Green
            } else if (data.msg === "wow you suck you lost.") {
                document.getElementById('turn-display').style.color = "#FF5252"; // Red
            }
        });
    </script>
</body>
</html>
